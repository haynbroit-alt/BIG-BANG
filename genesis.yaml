universe:
  name: "SwiftAudit"
  type: "saas"

  # ── Authentication ───────────────────────────────────────────────────────────
  auth:
    enabled: true
    provider: "jwt"
    user_fields:
      - name: "full_name"
        type: "string"
        required: false
      - name: "company"
        type: "string"
        required: false

  # ── Roles & Permissions ──────────────────────────────────────────────────────
  roles:
    - name: "admin"
      permissions: ["*"]
    - name: "user"
      permissions: ["read", "create"]

  # ── Data Model ───────────────────────────────────────────────────────────────
  entities:
    - name: "Site"
      fields:
        - name: "url"
          type: "string"
          required: true
        - name: "label"
          type: "string"
          required: false
        - name: "score"
          type: "integer"
          computed: true
        - name: "status"
          type: "string"
          required: false

    - name: "Report"
      fields:
        - name: "site_id"
          type: "integer"
          required: true
        - name: "summary"
          type: "text"
          required: false
        - name: "passed"
          type: "boolean"
          required: false

  # ── Business Workflows ───────────────────────────────────────────────────────
  flows:
    - name: "audit"
      trigger: "user_submits_url"
      steps:
        - action: "validate_url"
        - action: "scan_site"
        - action: "compute_score"
        - action: "generate_report"
        - action: "send_email"

  # ── Monetization ─────────────────────────────────────────────────────────────
  monetization:
    model: "subscription"
    plans:
      - name: "Starter"
        price: 9
        currency: "EUR"
      - name: "Pro"
        price: 29
        currency: "EUR"
      - name: "Business"
        price: 99
        currency: "EUR"

  # ── Security ─────────────────────────────────────────────────────────────────
  security:
    ed25519: false
    ledger: false
